<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Sky background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F0E0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D8A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B5E1F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#skyGrad)" />
  <!-- Ground -->
  <rect y="480" width="1200" height="120" fill="url(#groundGrad)" />

  <!-- Trees (background layer) -->
  <g opacity="0.5">
    <polygon points="80,480 30,380 130,380" fill="#2D5A1B" />
    <polygon points="80,430 40,340 120,340" fill="#3A7A24" />
    <polygon points="80,390 45,290 115,290" fill="#4A9A30" />
    <rect x="73" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="200,480 150,380 250,380" fill="#2D5A1B" />
    <polygon points="200,430 160,340 240,340" fill="#3A7A24" />
    <polygon points="200,390 165,290 235,290" fill="#4A9A30" />
    <rect x="193" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="350,480 290,360 410,360" fill="#2D5A1B" />
    <polygon points="350,420 300,320 400,320" fill="#3A7A24" />
    <polygon points="350,375 305,270 395,270" fill="#4A9A30" />
    <rect x="343" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="500,480 440,360 560,360" fill="#2D5A1B" />
    <polygon points="500,420 450,320 550,320" fill="#3A7A24" />
    <polygon points="500,375 455,270 545,270" fill="#4A9A30" />
    <rect x="493" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="700,480 640,360 760,360" fill="#2D5A1B" />
    <polygon points="700,420 650,320 750,320" fill="#3A7A24" />
    <polygon points="700,375 655,270 745,270" fill="#4A9A30" />
    <rect x="693" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="850,480 790,360 910,360" fill="#2D5A1B" />
    <polygon points="850,420 800,320 900,320" fill="#3A7A24" />
    <polygon points="850,375 805,270 895,270" fill="#4A9A30" />
    <rect x="843" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="1000,480 940,360 1060,360" fill="#2D5A1B" />
    <polygon points="1000,420 950,320 1050,320" fill="#3A7A24" />
    <polygon points="1000,375 955,270 1045,270" fill="#4A9A30" />
    <rect x="993" y="480" width="14" height="60" fill="#6B4226" />

    <polygon points="1150,480 1090,360 1210,360" fill="#2D5A1B" />
    <polygon points="1150,420 1100,320 1200,320" fill="#3A7A24" />
    <polygon points="1150,375 1105,270 1195,270" fill="#4A9A30" />
    <rect x="1143" y="480" width="14" height="60" fill="#6B4226" />
  </g>

  <!-- Overlay panel -->
  <rect x="200" y="160" width="800" height="200" rx="12" fill="rgba(0,0,0,0.55)" />

  <!-- Text -->
  <text x="600" y="230" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Gen4Regen Dataset</text>
  <text x="600" y="285" font-family="Georgia, serif" font-size="22" fill="#B8F5B8" text-anchor="middle">Forest Regeneration Mapping</text>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="16" fill="#CCCCCC" text-anchor="middle">Placeholder — replace with your teaser image</text>

  <!-- Segmentation color patches (decorative) -->
  <rect x="200" y="510" width="80" height="30" rx="4" fill="#FF6B6B" opacity="0.8"/>
  <text x="290" y="530" font-family="Arial" font-size="13" fill="white">Spruce</text>
  <rect x="360" y="510" width="80" height="30" rx="4" fill="#4ECDC4" opacity="0.8"/>
  <text x="450" y="530" font-family="Arial" font-size="13" fill="white">Fir</text>
  <rect x="510" y="510" width="80" height="30" rx="4" fill="#FFE66D" opacity="0.8"/>
  <text x="600" y="530" font-family="Arial" font-size="13" fill="white">Pine</text>
  <rect x="660" y="510" width="80" height="30" rx="4" fill="#A29BFE" opacity="0.8"/>
  <text x="750" y="530" font-family="Arial" font-size="13" fill="white">Birch</text>
  <rect x="810" y="510" width="80" height="30" rx="4" fill="#FD79A8" opacity="0.8"/>
  <text x="900" y="530" font-family="Arial" font-size="13" fill="white">Other</text>
</svg>
